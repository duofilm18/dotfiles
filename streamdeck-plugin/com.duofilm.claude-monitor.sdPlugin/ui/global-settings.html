<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Claude Monitor Settings</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 12px;
            color: #ccc;
            background: #2d2d2d;
            margin: 0;
            padding: 8px;
        }
        .sdpi-item {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }
        .sdpi-item-label {
            flex: 0 0 80px;
            text-align: right;
            padding-right: 8px;
            color: #969696;
        }
        .sdpi-item-value {
            flex: 1;
            background: #3b3b3b;
            border: 1px solid #5b5b5b;
            border-radius: 3px;
            color: #d8d8d8;
            padding: 4px 6px;
            font-size: 12px;
        }
        .sdpi-item-value:focus {
            border-color: #0078d7;
            outline: none;
        }
    </style>
</head>
<body>
    <div class="sdpi-item">
        <div class="sdpi-item-label">Broker IP</div>
        <input class="sdpi-item-value" id="broker" type="text" placeholder="192.168.88.10" />
    </div>
    <div class="sdpi-item">
        <div class="sdpi-item-label">Port</div>
        <input class="sdpi-item-value" id="port" type="number" placeholder="1883" />
    </div>
    <script>
    let ws = null;
    let piUUID = "";

    /* Stream Deck app calls this global function to initialize the PI */
    function connectElgatoStreamDeckSocket(port, uuid, registerEvent, info, actionInfo) {
        piUUID = uuid;
        ws = new WebSocket("ws://127.0.0.1:" + port);

        ws.onopen = function () {
            ws.send(JSON.stringify({ event: registerEvent, uuid: piUUID }));
            ws.send(JSON.stringify({ event: "getGlobalSettings", context: piUUID }));
        };

        ws.onmessage = function (evt) {
            const msg = JSON.parse(evt.data);
            if (msg.event === "didReceiveGlobalSettings") {
                const s = msg.payload.settings || {};
                document.getElementById("broker").value = s.mqttBroker || "";
                document.getElementById("port").value = s.mqttPort || "";
            }
        };
    }

    function save() {
        if (!ws) return;
        ws.send(JSON.stringify({
            event: "setGlobalSettings",
            context: piUUID,
            payload: {
                mqttBroker: document.getElementById("broker").value || "192.168.88.10",
                mqttPort: parseInt(document.getElementById("port").value) || 1883,
            },
        }));
    }

    document.getElementById("broker").addEventListener("change", save);
    document.getElementById("port").addEventListener("change", save);
    </script>
</body>
</html>
