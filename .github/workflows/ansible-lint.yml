---
name: Ansible Lint

on:
  push:
    paths:
      - "ansible/**"
      - ".ansible-lint"
      - ".github/workflows/ansible-lint.yml"
  pull_request:
    paths:
      - "ansible/**"
      - ".ansible-lint"
      - ".github/workflows/ansible-lint.yml"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ansible-lint
        run: pip install ansible-lint

      - name: Install Ansible Galaxy collections
        run: ansible-galaxy collection install ansible.posix community.docker community.general

      - name: Check banned patterns
        run: |
          echo "=== Checking for banned Ansible patterns ==="
          err=0
          # 禁止 --break-system-packages（用 venv）
          if grep -r 'break-system-packages' ansible/; then
            echo "❌ 禁止 --break-system-packages，改用 virtualenv"; err=1
          fi
          # 禁止 ansible_env.HOME（用 ansible_facts.user_dir）
          if grep -r 'ansible_env\.HOME' ansible/; then
            echo "❌ 禁止 ansible_env.HOME，改用 ansible_facts.user_dir"; err=1
          fi
          # 禁止 /usr/bin/python3 在 systemd template（用 venv/bin/python）
          if grep -r '/usr/bin/python3' ansible/roles/*/templates/ 2>/dev/null; then
            echo "❌ systemd ExecStart 禁止 /usr/bin/python3，改用 venv/bin/python"; err=1
          fi
          if [ $err -ne 0 ]; then exit 1; fi
          echo "✅ All checks passed"

      - name: Run ansible-lint
        run: ansible-lint ansible/

      - name: Syntax check playbooks
        working-directory: ansible
        run: |
          ansible-playbook --syntax-check site.yml
          ansible-playbook --syntax-check rpi5b.yml
          ansible-playbook --syntax-check wsl.yml
