---
# RPi5B 完整部署
- name: Deploy RPi5B
  hosts: rpi5b
  gather_facts: true

  pre_tasks:
    - name: Sync dotfiles to RPi5B
      ansible.posix.synchronize:
        src: "{{ dotfiles_local }}/rpi5b/"
        dest: "{{ remote_dotfiles }}/rpi5b/"
        delete: true
      become: false
      tags: [always]

    - name: Gather service facts
      ansible.builtin.service_facts:

  roles:
    - rpi_system
    - rpi_docker
    - rpi_mosquitto
    - rpi_tailscale
    - rpi_crontab
    - rpi_cleanup

  post_tasks:
    - name: Write deploy marker (for Stop hook deploy check)
      delegate_to: localhost
      ansible.builtin.shell: |
        mkdir -p ~/.cache
        git -C {{ dotfiles_local }} rev-parse HEAD > ~/.cache/rpi5b-last-deploy
      become: false
      changed_when: false
      tags: [always]

    - name: Show service status
      ansible.builtin.shell: |
        echo '--- systemd ---'
        for svc in mosquitto; do
          status=$(systemctl is-active $svc 2>/dev/null || echo 'inactive')
          printf '  %-15s %s\n' $svc $status
        done
        echo ''
        echo '--- docker ---'
        docker ps --format '  {{ '{{' }}.Names{{ '}}' }}\t{{ '{{' }}.Status{{ '}}' }}' 2>/dev/null || true
      register: service_status
      changed_when: false

    - name: Display service status
      ansible.builtin.debug:
        msg: "{{ service_status.stdout_lines }}"

    - name: Remind manual checks
      ansible.builtin.debug:
        msg:
          - "手動檢查事項："
          - "1. push-temp.sh 的 Uptime Kuma Push URLs（含 API token）"
          - "2. ntfy 推播已改用 dispatch.sh 直接 curl ntfy.sh 雲端"
          - "3. fstab 根目錄掛載加上 noatime,commit=3600"
          - "4. Pi-hole Web UI 密碼（PIHOLE_PASSWORD 環境變數）"
          - "5. 路由器 DHCP DNS 指向 192.168.88.10"
