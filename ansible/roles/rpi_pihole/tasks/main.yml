---
# roles/rpi_pihole - Pi-hole 原生安裝（非 Docker）
#
# 重要：pihole.toml 必須在安裝之後部署，因為安裝器會覆寫整個檔案。
# 順序：停 resolved → 裝 Pi-hole → 部署 toml → 設密碼 → 啟動

- name: Disable systemd-resolved (free port 53 for Pi-hole)
  ansible.builtin.systemd:
    name: systemd-resolved
    enabled: false
    state: stopped
  failed_when: false
  tags: [pihole]

- name: Set static resolv.conf
  ansible.builtin.copy:
    content: "nameserver 1.1.1.1\n"
    dest: /etc/resolv.conf
  tags: [pihole]

- name: Stop old Docker pihole container (migration)
  ansible.builtin.command: docker stop pihole
  failed_when: false
  changed_when: false
  tags: [pihole]

- name: Remove old Docker pihole container (migration)
  ansible.builtin.command: docker rm pihole
  failed_when: false
  changed_when: false
  tags: [pihole]

- name: Check if Pi-hole is installed
  ansible.builtin.command: pihole version
  register: pihole_check
  changed_when: false
  failed_when: false
  tags: [pihole]

- name: Install Pi-hole (unattended)
  ansible.builtin.shell: curl -sSL https://install.pi-hole.net | bash /dev/stdin --unattended
  args:
    creates: /usr/local/bin/pihole
  when: pihole_check.rc != 0
  tags: [pihole]

# 安裝器會覆寫 pihole.toml，所以用 pihole-FTL CLI 設定（冪等）
- name: Configure upstream DNS
  ansible.builtin.command: pihole-FTL --config dns.upstreams '{{ pihole_upstream_dns | to_json }}'
  register: dns_result
  changed_when: dns_result.stdout != (pihole_upstream_dns | join(', '))
  tags: [pihole]

- name: Configure listening mode
  ansible.builtin.command: pihole-FTL --config dns.listeningMode {{ pihole_listening_mode }}
  register: listen_result
  changed_when: listen_result.stdout | upper != pihole_listening_mode | upper
  tags: [pihole]

- name: Configure webserver port
  ansible.builtin.command: pihole-FTL --config webserver.port 80o
  register: port_result
  changed_when: port_result.stdout != "80o"
  tags: [pihole]

- name: Set Pi-hole web password
  ansible.builtin.command: pihole setpassword {{ pihole_password }}
  changed_when: false
  no_log: true
  tags: [pihole]

- name: Enable and start pihole-FTL
  ansible.builtin.systemd:
    name: pihole-FTL
    enabled: true
    state: started
  tags: [pihole]

- name: Restart pihole-FTL if config changed
  ansible.builtin.systemd:
    name: pihole-FTL
    state: restarted
  when: dns_result.changed or listen_result.changed or port_result.changed
  tags: [pihole]

- name: Update gravity
  ansible.builtin.command: pihole -g
  changed_when: false
  tags: [pihole]
