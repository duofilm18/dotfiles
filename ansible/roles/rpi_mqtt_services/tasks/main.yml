---
# roles/rpi_mqtt_services - mqtt-led + systemd

# --- 清理舊 mqtt-ntfy（一次性） ---
- name: Stop and disable mqtt-ntfy (removed)
  ansible.builtin.systemd:
    name: mqtt-ntfy
    state: stopped
    enabled: false
  failed_when: false
  tags: [mqtt, cleanup]

- name: Remove mqtt-ntfy service file
  ansible.builtin.file:
    path: /etc/systemd/system/mqtt-ntfy.service
    state: absent
  notify: Reload systemd daemon
  tags: [mqtt, cleanup]

- name: Remove mqtt-ntfy directory
  ansible.builtin.file:
    path: "{{ ansible_facts.user_dir }}/mqtt-ntfy"
    state: absent
  tags: [mqtt, cleanup]

# --- mqtt-led ---
- name: Create mqtt-led directory
  ansible.builtin.file:
    path: "{{ mqtt_led_dir }}"
    state: directory
    mode: "0755"
  tags: [mqtt, led]

- name: Deploy mqtt-led files
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ mqtt_led_dir }}/{{ item.dest }}"
    remote_src: true
  loop:
    - { src: "{{ remote_dotfiles }}/rpi5b/mqtt-led/mqtt_led.py", dest: mqtt_led.py }
    - { src: "{{ remote_dotfiles }}/rpi5b/mqtt-led/melodies.py", dest: melodies.py }
    - { src: "{{ remote_dotfiles }}/rpi5b/mqtt-led/led-effects.json", dest: led-effects.json }
    - { src: "{{ remote_dotfiles }}/rpi5b/mqtt-led/requirements.txt", dest: requirements.txt }
  notify: Reload and restart mqtt services
  tags: [mqtt, led]

- name: Deploy mqtt-led config (example if no config exists)
  ansible.builtin.copy:
    src: "{{ remote_dotfiles }}/rpi5b/mqtt-led/config.json.example"
    dest: "{{ mqtt_led_dir }}/config.json"
    remote_src: true
    force: false
  tags: [mqtt, led]

- name: Install mqtt-led requirements
  ansible.builtin.pip:
    requirements: "{{ mqtt_led_dir }}/requirements.txt"
    virtualenv: "{{ mqtt_led_dir }}/venv"
    virtualenv_command: python3 -m venv --system-site-packages
  tags: [mqtt, led]

# --- systemd services ---
- name: Deploy mqtt-led systemd service
  ansible.builtin.template:
    src: mqtt-led.service.j2
    dest: /etc/systemd/system/mqtt-led.service
    mode: "0644"
  notify: Reload and restart mqtt services
  tags: [mqtt, led, systemd]

- name: Enable mqtt-led service
  ansible.builtin.systemd:
    name: mqtt-led
    enabled: true
    state: started
  tags: [mqtt, systemd]

