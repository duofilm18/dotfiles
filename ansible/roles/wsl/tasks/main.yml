---
# roles/wsl - WSL 開發環境設定

- name: Install base packages
  become: true
  ansible.builtin.apt:
    name:
      - git
      - vim
      - tmux
      - curl
      - build-essential
      - jq
      - zstd
      - mosquitto
      - mosquitto-clients
      - bats
      - default-jdk
      - python3-pip
      - python3-venv
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Create fontconfig directory
  ansible.builtin.file:
    path: "{{ ansible_facts.user_dir }}/.config/fontconfig/conf.d"
    state: directory
    mode: "0755"
  tags: [obsidian]

- name: Deploy Windows fonts config for WSL apps
  ansible.builtin.template:
    src: windows-fonts.conf.j2
    dest: "{{ ansible_facts.user_dir }}/.config/fontconfig/conf.d/50-windows-fonts.conf"
    mode: "0644"
  notify: Refresh font cache
  tags: [obsidian]

- name: Create Obsidian directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ ansible_facts.user_dir }}/.local/bin"
    - "{{ ansible_facts.user_dir }}/.local/opt"
    - "{{ ansible_facts.user_dir }}/.local/share/applications"
  tags: [obsidian]

- name: Download Obsidian package
  ansible.builtin.get_url:
    url: "{{ obsidian_deb_url }}"
    dest: "{{ obsidian_deb_path }}"
    mode: "0644"
    force: false
  tags: [obsidian]

- name: Extract Obsidian package
  ansible.builtin.command:
    cmd: "dpkg-deb -x {{ obsidian_deb_path }} {{ obsidian_install_root }}"
  args:
    creates: "{{ obsidian_install_root }}/opt/Obsidian/obsidian"
  tags: [obsidian]

- name: Install Obsidian launcher
  ansible.builtin.copy:
    dest: "{{ obsidian_launcher_path }}"
    mode: "0755"
    content: |
      #!/bin/bash
      if locale -a 2>/dev/null | grep -qi '^zh_TW\.utf-?8$'; then
          export LANG=zh_TW.UTF-8
          export LANGUAGE=zh_TW:zh
          export LC_ALL=zh_TW.UTF-8
      else
          export LANG=C.UTF-8
          export LANGUAGE=
          export LC_ALL=C.UTF-8
      fi
      # WSLg flags：
      #   --ozone-platform=wayland   修正 Electron on X11 滑鼠座標位移
      #   --disable-gpu*             避開 WSLg / Electron GPU 初始化問題
      #   --use-angle=swiftshader    強制使用軟體渲染，避免 GL implementation mismatch
      exec "{{ obsidian_install_root }}/opt/Obsidian/obsidian" \
          --ozone-platform=wayland \
          --enable-features=UseOzonePlatform,WaylandWindowDecorations \
          --disable-gpu \
          --disable-gpu-compositing \
          --use-angle=swiftshader \
          "$@"
  tags: [obsidian]

- name: Install xdg-settings shim for WSL Obsidian
  ansible.builtin.copy:
    dest: "{{ ansible_facts.user_dir }}/.local/bin/xdg-settings"
    mode: "0755"
    content: |
      #!/bin/bash
      exit 0
  tags: [obsidian]

- name: Install Obsidian desktop entry
  ansible.builtin.copy:
    dest: "{{ obsidian_desktop_path }}"
    mode: "0644"
    content: |
      [Desktop Entry]
      Name=Obsidian
      Exec={{ obsidian_launcher_path }} %u
      Terminal=false
      Type=Application
      Icon={{ obsidian_install_root }}/opt/Obsidian/resources/icon.png
      StartupWMClass=obsidian
      Comment=Obsidian
      MimeType=x-scheme-handler/obsidian;
      Categories=Office;
  tags: [obsidian]

- name: Install npm global packages (via nvm)
  ansible.builtin.shell: |
    export NVM_DIR="{{ ansible_user_dir }}/.nvm"
    . "$NVM_DIR/nvm.sh"
    npm ls -g --depth=0 {{ item }} 2>/dev/null || npm i -g {{ item }}
  args:
    executable: /bin/bash
  loop:
    - codecharta-analysis
    - codecharta-visualization
  changed_when: false

- name: Configure Git user.name
  community.general.git_config:
    name: user.name
    value: "{{ git_user_name }}"
    scope: global

- name: Configure Git user.email
  community.general.git_config:
    name: user.email
    value: "{{ git_user_email }}"
    scope: global

- name: Configure Git core.editor
  community.general.git_config:
    name: core.editor
    value: vim
    scope: global

- name: Configure Git credential.helper
  community.general.git_config:
    name: credential.helper
    value: "cache --timeout 86400"
    scope: global

- name: Configure Git aliases
  community.general.git_config:
    name: "alias.{{ item.key }}"
    value: "{{ item.value }}"
    scope: global
  loop:
    - { key: co, value: checkout }
    - { key: ci, value: commit }
    - { key: st, value: status }
    - { key: br, value: branch }
    - { key: lg, value: "log --graph --pretty=format:'%Cred%h - %Cgreen[%an]%Creset -%C(yellow)%d%Creset %s %C(yellow)<%cr>%Creset' --abbrev-commit --date=relative" }

- name: Setup Git pre-commit hook
  ansible.builtin.copy:
    dest: "{{ dotfiles_local }}/.git/hooks/pre-commit"
    mode: "0755"
    content: |
      #!/bin/bash
      # pre-commit hook - 自動更新 README.md 目錄結構 + 部署完整性檢查
      ~/dotfiles/scripts/update-readme.sh
      git add README.md

      # 部署完整性靜態檢查（bats 不在時不擋 commit）
      if command -v bats &>/dev/null; then
          bats ~/dotfiles/tests/deploy_integrity.bats
      fi

- name: Configure mosquitto local broker
  become: true
  ansible.builtin.copy:
    dest: /etc/mosquitto/conf.d/local.conf
    content: |
      listener 1883
      allow_anonymous true
    mode: "0644"
  notify: Restart mosquitto

- name: Enable mosquitto service
  become: true
  ansible.builtin.systemd:
    name: mosquitto
    enabled: true
    state: started

- name: Install Python dev dependencies
  ansible.builtin.pip:
    requirements: "{{ dotfiles_local }}/requirements-dev.txt"
    virtualenv: "{{ dotfiles_local }}/.venv"
    virtualenv_command: python3 -m venv

# ── IME MQTT Publisher（systemd user service）──

- name: Enable lingering for user (systemd user services without login)
  become: true
  ansible.builtin.command:
    cmd: loginctl enable-linger {{ ansible_user }}
  changed_when: false

- name: Create systemd user directory
  ansible.builtin.file:
    path: "{{ ansible_user_dir }}/.config/systemd/user"
    state: directory
    mode: "0755"

- name: Deploy ime-mqtt-publisher service
  ansible.builtin.template:
    src: ime-mqtt-publisher.service.j2
    dest: "{{ ansible_user_dir }}/.config/systemd/user/ime-mqtt-publisher.service"
    mode: "0644"
  notify: Restart ime-mqtt-publisher

- name: Enable and start ime-mqtt-publisher
  ansible.builtin.systemd:
    name: ime-mqtt-publisher
    enabled: true
    state: started
    scope: user
